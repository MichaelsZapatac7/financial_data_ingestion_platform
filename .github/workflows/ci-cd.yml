name: Financial Data Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
  SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
  SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}

jobs:
  validate:
    name: Validate SQL
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SQLFluff
        run: pip install sqlfluff

      - name: Lint SQL files
        run: |
          sqlfluff lint \
            02_raw_ingestion/ \
            03_staging/ \
            04_canonical/ \
            05_data_quality/ \
            06_cicd/ \
            --dialect snowflake \
            --config .sqlfluff \
            --format github-annotation-native \
            --warn-unused-ignores \
            || echo "::warning::SQLFluff found formatting issues"
        continue-on-error: true

      - name: Check for critical SQL errors
        run: |
          echo "Checking SQL files for syntax errors..."
          error_count=0
          for file in $(find . -name "*.sql" -type f); do
            if ! grep -qE "(CREATE|ALTER|DROP|INSERT|UPDATE|DELETE|SELECT|USE|SET|CALL)" "$file"; then
              echo "::warning file=$file::File may be empty or invalid"
            fi
          done
          echo "SQL syntax check completed"

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ always() && needs.validate.result != 'failure' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install snowflake-connector-python pytest

      - name: Run unit tests
        run: |
          echo "Unit tests would run here with Snowflake connection"
          echo "Skipping actual Snowflake tests in CI (requires secrets)"
        continue-on-error: true

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'dev'
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Would deploy to DEV environment"
          echo "Scripts to execute:"
          ls -la 02_raw_ingestion/*.sql
          ls -la 03_staging/*.sql
          ls -la 04_canonical/*.sql
          ls -la 05_data_quality/*.sql

  deploy-staging:
    name: Deploy to STAGING
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Would deploy to STAGING environment"

  deploy-prod:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://app.snowflake.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: echo "Would deploy to PRODUCTION environment"
