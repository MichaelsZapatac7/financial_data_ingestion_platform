name: Scheduled Data Ingestion

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      batch_id:
        description: 'Custom batch ID (optional)'
        required: false

env:
  SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
  SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
  SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

jobs:
  ingest:
    name: Run Data Ingestion
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SnowSQL
        run: |
          curl -O https://sfc-repo.snowflakecomputing.com/snowsql/bootstrap/1.2/linux_x86_64/snowsql-1.2.28-linux_x86_64.bash
          SNOWSQL_DEST=~/bin SNOWSQL_LOGIN_SHELL=~/.profile bash snowsql-1.2.28-linux_x86_64.bash

      - name: Run ingestion pipeline
        run: |
          ~/bin/snowsql -a $SNOWFLAKE_ACCOUNT \
                        -u $SNOWFLAKE_USER \
                        -d FINANCIAL_DATA_PLATFORM \
                        -f 06_cicd/run_ingestion.sql

      - name: Run DQ checks
        run: |
          ~/bin/snowsql -a $SNOWFLAKE_ACCOUNT \
                        -u $SNOWFLAKE_USER \
                        -d FINANCIAL_DATA_PLATFORM \
                        -q "CALL data_quality.sp_run_all_dq_checks(CURRENT_DATE()::VARCHAR)"

      - name: Generate DQ report
        run: |
          ~/bin/snowsql -a $SNOWFLAKE_ACCOUNT \
                        -u $SNOWFLAKE_USER \
                        -d FINANCIAL_DATA_PLATFORM \
                        -q "SELECT * FROM data_quality.v_batch_quality_summary ORDER BY metric_date DESC LIMIT 1" \
                        -o output_format=csv > dq_report.csv

      - name: Upload DQ report
        uses: actions/upload-artifact@v4
        with:
          name: dq-report-${{ github.run_id }}
          path: dq_report.csv
